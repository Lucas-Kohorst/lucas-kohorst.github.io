<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1816112137627897856/Dc4NYRdj_400x400.jpg">
    <style>
        body {
            font-family: Georgia, serif;
            font-size: 18px;
            line-height: 1.6;
            color: #111;
            background: #fff;
            max-width: 680px;
            margin: 60px auto;
            padding: 0 24px;
        }
        .site-title {
            font-size: 28px;
            font-weight: bold;
            color: #5b21b6;
            text-decoration: underline;
            display: block;
            margin-bottom: 8px;
        }
        .site-nav {
            margin-bottom: 48px;
        }
        .site-nav a {
            color: #5b21b6;
            text-decoration: underline;
            font-size: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .date {
            font-style: italic;
            color: #444;
            margin-bottom: 28px;
            font-size: 17px;
        }
        p {
            margin-bottom: 20px;
        }
        a {
            color: #5b21b6;
            text-decoration: underline;
        }
        .post-nav {
            margin-bottom: 48px;
        }
        .post-nav a {
            color: #5b21b6;
            text-decoration: underline;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="post-nav">
        <a href="/">← home</a>
    </div>

    <h1>{{ page.title }}</h1>
    <div class="date">{{ page.date | date: "%d %b, %Y" }}</div>

    <div class="content">
        {{ content }}
    </div>
</body>
</html>
