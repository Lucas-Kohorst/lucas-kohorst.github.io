<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/jpeg" href="https://pbs.twimg.com/profile_images/1816112137627897856/Dc4NYRdj_400x400.jpg">
    <style>
        body {
            font-family: Georgia, serif;
            font-size: 18px;
            line-height: 1.6;
            color: #111;
            background: #fff;
            max-width: 680px;
            margin: 60px auto;
            padding: 0 24px;
        }
        .site-title {
            font-size: 28px;
            font-weight: bold;
            color: #5b21b6;
            text-decoration: underline;
            display: block;
            margin-bottom: 8px;
        }
        .site-nav {
            margin-bottom: 48px;
        }
        .site-nav a {
            color: #5b21b6;
            text-decoration: underline;
            font-size: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .date {
            font-style: italic;
            color: #444;
            margin-bottom: 28px;
            font-size: 17px;
        }
        p {
            margin-bottom: 20px;
        }
        a {
            color: #5b21b6;
            text-decoration: underline;
        }
        .upvote-section {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .upvote-btn {
            background: none;
            border: 1px solid #5b21b6;
            border-radius: 4px;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 16px;
            color: #5b21b6;
        }
        .upvote-btn:hover {
            background-color: #f3e8ff;
        }
        .upvote-count {
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <a href="/" class="site-nav">← home</a>

    <h1>{{ page.title }}</h1>
    <div class="date">{{ page.date | date: "%d %b, %Y" }}</div>

    <div class="upvote-section">
        <button class="upvote-btn" onclick="upvotePost('{{ page.url }}')">▲</button>
        <span class="upvote-count" id="upvote-count-{{ page.url | replace: '/', '-' }}">{{ page.upvotes | default: 0 }}</span>
    </div>

    <div class="content">
        {{ content }}
    </div>

    <script>
        async function upvotePost(postUrl) {
            try {
                const response = await fetch('https://upvote-api.kohor.st/api/upvote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ post: postUrl })
                });
                const data = await response.json();
                document.getElementById(`upvote-count-${postUrl.replace('/', '-')}`).textContent = data.upvotes;
            } catch (error) {
                console.error('Upvote failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const postUrl = '{{ page.url }}';
            try {
                const response = await fetch(`https://upvote-api.kohor.st/api/upvote/${postUrl}`);
                const data = await response.json();
                document.getElementById(`upvote-count-${postUrl.replace('/', '-')}`).textContent = data.upvotes || 0;
            } catch (error) {
                console.error('Failed to load upvotes:', error);
            }
        });
    </script>
</body>
</html>
